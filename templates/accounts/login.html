<!DOCTYPE html>
<html>
<head>
    <title>Login - MyQuiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 45px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 { font-size: 28px; color: #2c3e50; }
        .logo p { color: #7f8c8d; font-size: 14px; margin-top: 5px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #3498db; outline: none; }
        button {
            width: 100%;
            padding: 13px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #2980b9; }
        .error {
            background: #fadbd8;
            border: 1px solid #e74c3c;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #e74c3c;
            text-align: center;
        }
        .divider {
            text-align: center;
            margin: 20px 0 15px;
            color: #bdc3c7;
            font-size: 13px;
        }
        .register-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .register-options a {
            text-align: center;
            padding: 11px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .register-options a:hover { opacity: 0.85; }
        .btn-student {
            background: #eaf4fb;
            color: #3498db;
            border: 1px solid #3498db;
        }
        .btn-teacher {
            background: #eaf0f6;
            color: #2c3e50;
            border: 1px solid #2c3e50;
        }
        .links {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <h1>📚 MyQuiz</h1>
        <p>Login to your account</p>
    </div>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label>Full Name</label>
        <input type="text" name="username" placeholder="Enter your username" required />

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required />

        <button type="submit">Login →</button>
    </form>

    <div class="divider">— Don't have an account? Register as —</div>

    <div class="register-options">
        <a href="{% url 'register' %}" class="btn-student">🎓 Student</a>
        <a href="{% url 'register_teacher' %}" class="btn-teacher">👨‍🏫 Teacher</a>
    </div>
</div>

</body>
</html>
