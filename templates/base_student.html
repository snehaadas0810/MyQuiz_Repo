{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}Student Panel{% endblock %}</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
        }

        /* NAVBAR */
        .navbar {
            background: #34495e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            font-size: 20px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            /* background: #3498db; */
            transition: 0.2s;
        }

        .nav-links a:hover {
            background: #2980b9;
        }

        .logout {
            background: #e74c3c;
        }

        .logout:hover {
            background: #c0392b;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* MESSAGES */
        .message {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>📚 MyQuiz - Student</h2>

    <div class="nav-links">
        <a href="{% url 'student_dashboard' %}">🏠 Dashboard</a>
        <a href="{% url 'student_results' %}">📊 My Results</a>
        <a href="{% url 'student_profile' %}">👨‍🏫 Profile</a>
        <a href="{% url 'logout' %}" class="logout">Logout</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container">

    {% if messages %}
        {% for message in messages %}
            <div class="message 
                {% if message.tags == 'success' %}success{% endif %}
                {% if message.tags == 'error' %}error{% endif %}
                {% if message.tags == 'warning' %}warning{% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
